# Audit fix #3: WebSocket upgrade headers are required for /stream endpoints.
# Without proxy_http_version 1.1 and the Upgrade/Connection headers,
# the browser's WebSocket handshake silently falls back to HTTP and fails.

server {
    listen 80;
    server_name _;

    # --- Static React app ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- WebSocket streaming (upload + view) ---
    # Must be declared before /api to avoid /stream matching /api prefix rules.
    location /stream {
        proxy_pass         http://backend:8000;

        # Audit fix #3: these three lines are required for WS to work
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Long timeout — streams are persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- REST API ---
    location /api {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # --- Health probe (forwarded from frontend to backend) ---
    location /health {
        proxy_pass http://backend:8000/health;
    }
}
